{% set version = "0.5.0" %}

package:
  name: scikit-sparse
  version: {{ version }}

source:
  fn: scikit-sparse-{{ version }}.tar.gz
  url: https://github.com/scikit-sparse/scikit-sparse/archive/v{{ version }}.tar.gz
  sha256: 2f98b2c7d089a65d3eaa7533393966b9e695a429509cf0c4f5d9bca05a3f8687

build:
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy >=2.0                            # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - numpy
    - suitesparse
    - cython
    - setuptools
  run:
    - python
    - scipy >=1.14
    - packaging
    - suitesparse

test:
  imports:
    - sksparse
    - sksparse.amd
    - sksparse.btf
    - sksparse.camd
    - sksparse.ccolamd
    - sksparse.cholmod
    - sksparse.colamd
    - sksparse.klu
    - sksparse.spqr
    - sksparse.umfpack
  commands:
    - python -c "import sksparse; print(sksparse.__version__)"

about:
  home: https://github.com/scikit-sparse/scikit-sparse
  license: BSD-2-Clause
  license_file: LICENSE.txt
  summary: A companion to the scipy.sparse library for sparse matrix manipulation in Python.

extra:
  recipe-maintainers:
    - grlee77
    - patricksnape
    - jor-
    - jellis18
    - AaronDJohnson
    - broesler
